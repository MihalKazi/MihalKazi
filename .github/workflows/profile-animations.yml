name: Generate Profile Animations

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    name: Generate contribution games
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate Snake contribution game
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: MihalKazi
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate arcade contribution games
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: MihalKazi
          games: "pacman,breakout,galaga,bomberman"

      - name: Make sure every SVG is inside dist
        run: |
          mkdir -p dist
          echo "Generated SVG files:"
          find . -maxdepth 3 -type f -name "*.svg" -print
          find . -maxdepth 3 -type f -name "*contribution-graph*.svg" -not -path "./dist/*" -exec cp {} dist/ \;

      - name: Publish animations to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
